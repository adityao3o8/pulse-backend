services:
  - type: web
    name: pulse-crm
    runtime: python
    rootDir: crm
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TIME_SCALE
        value: "10"
      - key: DATABASE_URL
        sync: false
